<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Radar - 全球事件监控</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e27;
            color: #fff;
            overflow: hidden;
        }
        .container { display: flex; height: 100vh; }
        
        /* 左侧事件流 */
        .sidebar {
            width: 320px;
            background: #111827;
            border-right: 1px solid #1f2937;
            overflow-y: auto;
            padding: 20px;
        }
        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #60a5fa;
        }
        .event-item {
            background: #1f2937;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .event-item:hover {
            background: #374151;
            transform: translateX(5px);
        }
        .event-time {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 5px;
        }
        .event-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .event-tag {
            display: inline-block;
            padding: 3px 8px;
            background: #3b82f6;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 5px;
        }
        
        /* 主内容区 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        /* 顶部导航 */
        .header {
            height: 60px;
            background: #111827;
            border-bottom: 1px solid #1f2937;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #60a5fa;
        }
        .time-filter {
            display: flex;
            gap: 10px;
        }
        .time-btn {
            padding: 8px 16px;
            background: #1f2937;
            border: 1px solid #374151;
            color: #9ca3af;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .time-btn:hover, .time-btn.active {
            background: #3b82f6;
            color: #fff;
            border-color: #3b82f6;
        }
        
        /* 地图区域 */
        #map {
            flex: 1;
            position: relative;
        }
        
        /* 底部数据面板 */
        .bottom-panel {
            height: 180px;
            background: #111827;
            border-top: 1px solid #1f2937;
            padding: 20px 30px;
            overflow-x: auto;
        }
        .market-data {
            display: flex;
            gap: 30px;
        }
        .market-item {
            min-width: 150px;
        }
        .market-label {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 5px;
        }
        .market-value {
            font-size: 24px;
            font-weight: 700;
        }
        .market-change {
            font-size: 14px;
            margin-top: 5px;
        }
        .positive { color: #10b981; }
        .negative { color: #ef4444; }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧事件流 -->
        <div class="sidebar">
            <h2>📡 GLOBAL EVENTS</h2>
            <div id="eventList"></div>
        </div>
        
        <!-- 主内容区 -->
        <div class="main">
            <!-- 顶部导航 -->
            <div class="header">
                <div class="logo">⚡ Event Radar</div>
                <div class="time-filter">
                    <button class="time-btn active" data-range="today">Today</button>
                    <button class="time-btn" data-range="24h">24h</button>
                    <button class="time-btn" data-range="7d">7d</button>
                    <button class="time-btn" data-range="30d">30d</button>
                </div>
            </div>
            
            <!-- 地图 -->
            <div id="map"></div>
            
            <!-- 底部市场数据 -->
            <div class="bottom-panel">
                <div class="market-data" id="marketData"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 模拟事件数据
        const events = [
            { id: 1, time: '2h ago', title: 'Pedro Sánchez announces new economic reforms', location: [40.4168, -3.7038], tags: ['政治', '经济'] },
            { id: 2, time: '4h ago', title: 'UK arrests 12 in major fraud investigation', location: [51.5074, -0.1278], tags: ['法律'] },
            { id: 3, time: '6h ago', title: 'Greek court rules on debt restructuring', location: [37.9838, 23.7275], tags: ['金融'] },
            { id: 4, time: '8h ago', title: 'Fed signals potential rate adjustment', location: [38.9072, -77.0369], tags: ['央行', '利率'] },
            { id: 5, time: '10h ago', title: 'China announces tech sector regulations', location: [39.9042, 116.4074], tags: ['科技', '监管'] },
            { id: 6, time: '12h ago', title: 'Oil prices surge on supply concerns', location: [25.2048, 55.2708], tags: ['能源', '大宗'] }
        ];

        // 渲染事件列表
        const eventList = document.getElementById('eventList');
        events.forEach(event => {
            const item = document.createElement('div');
            item.className = 'event-item';
            item.innerHTML = `
                <div class="event-time">${event.time}</div>
                <div class="event-title">${event.title}</div>
                <div>${event.tags.map(tag => `<span class="event-tag">${tag}</span>`).join('')}</div>
            `;
            item.onclick = () => map.setView(event.location, 6);
            eventList.appendChild(item);
        });

        // 初始化地图
        const map = L.map('map').setView([30, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 添加事件标记
        events.forEach(event => {
            const marker = L.circleMarker(event.location, {
                radius: 8,
                fillColor: '#3b82f6',
                color: '#60a5fa',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map);
            
            marker.bindPopup(`<b>${event.title}</b><br>${event.time}`);
        });

        // 市场数据
        const marketData = [
            { label: 'DXY', value: '104.23', change: '+0.45%', positive: true },
            { label: 'EUR/USD', value: '1.0856', change: '-0.32%', positive: false },
            { label: 'GBP/USD', value: '1.2634', change: '+0.18%', positive: true },
            { label: 'USD/JPY', value: '149.82', change: '+0.67%', positive: true },
            { label: 'GOLD', value: '2,045', change: '-0.21%', positive: false }
        ];

        const marketPanel = document.getElementById('marketData');
        marketData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'market-item';
            div.innerHTML = `
                <div class="market-label">${item.label}</div>
                <div class="market-value">${item.value}</div>
                <div class="market-change ${item.positive ? 'positive' : 'negative'}">${item.change}</div>
            `;
            marketPanel.appendChild(div);
        });

        // 时间筛选
        document.querySelectorAll('.time-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
        });
    </script>
</body>
</html>
